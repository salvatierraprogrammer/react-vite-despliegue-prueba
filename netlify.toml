[build]
  command = "npm run build"
  publish = "dist"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

[build.processing.js]
  bundle = true
  minify = true

[context.production]
  branch = "main"

[context.deploy-preview]
  branch = "main"

[context.branch-deploy]
  branch = "main"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
